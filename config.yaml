mqtt:
  host: localhost # IP o hostname del broker Mosquitto
  port: 1883
  topic_prefix: seengo/comandos # el topic final sera seengo/comandos/{deviceId}
  publisher: stub # stub = solo imprime (dev) | mqtt = publica al broker real (produccion)

mongo:
  database: seengo
  collection_signs: user_signs # mapeo gesto→accion por usuario
  collection_events: sign_events # telemetria de reconocimientos

model:
  path: models/rf_signs.joblib

camera:
  type: webcam # webcam = OpenCV (dev Windows) | csi = Picamera2 (Raspberry Pi)
  index: 0 # 0 = webcam principal; cambia a 1 si tienes varias (solo webcam)
  width: 640
  height: 480
  headless: false # true = sin ventana de video (Pi por SSH, sin monitor)
  hflip: true # espejo horizontal (solo csi)
  vflip: true # volteo vertical (solo csi); hflip+vflip = rotacion 180

inference:
  confidence_threshold: 0.80 # ignorar predicciones con confianza menor a este valor
  cooldown_seconds: 1.0 # tiempo minimo entre disparos del mismo gesto (debounce)
  skip_frames: 2 # procesar 1 de cada N frames (1 = todos; 2-3 recomendado en Pi 3)

session:
  user_id: migueldr12 # userId fijo por sesion (mientras no haya login desde la app)
